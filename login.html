<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin - JOHE OLMOS ESTILISTA</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0a0a0a;
      --card: #121212;
      --accent: #d4af37;
      --text: #ffffff;
      --border: #222222;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
      margin: 0;
    }

    .login-box {
      background: var(--card);
      padding: 48px;
      border-radius: 20px;
      width: 100%;
      max-width: 400px;
      border: 1px solid var(--border);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      text-align: center;
    }

    h2 {
      font-family: 'Cinzel', serif;
      font-size: 1.5rem;
      margin-bottom: 24px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 16px;
      background: #1c1c1c;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: white;
      box-sizing: border-box;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
    }

    button {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #000;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: opacity 0.2s;
    }

    button:hover {
      opacity: 0.9;
    }

    #mensaje {
      margin-top: 20px;
      font-size: 0.9rem;
      min-height: 1.2em;
    }
  </style>
</head>
<body>

<div class="login-box">
  <h2>Admin Access</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Contraseña">
  <button onclick="login()">Ingresar</button>
  <p id="mensaje"></p>
</div>

<script>
  const { createClient } = supabase;

  const supabaseClient = createClient(
     "https://nkkyyqqqusodhwqvprik.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ra3l5cXFxdXNvZGh3cXZwcmlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMjU1MDIsImV4cCI6MjA4ODYwMTUwMn0.Gs5bdRrv9HNViruVjr8mQl4Oh2Ei1Hyryr0vxpdPPhU"
  );

  async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { error } = await supabaseClient.auth.signInWithPassword({
      email,
      password
    });

    if (error) {
      document.getElementById("mensaje").innerText = "❌ " + error.message;
    } else {
      window.location.href = "trabajos.html";
    }
  }
</script>

</body>
</html>
